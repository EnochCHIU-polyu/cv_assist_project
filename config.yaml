# CV 视觉辅助系统配置
# ===================
# 通过 --config <profile> 选择预设，预设值会覆盖下方基础配置。

# ---- Profile 预设（仅列出与 base 不同的字段） ----
profiles:
  fast: # 性能优先，适合低配设备
    model:
      owlvit_input_size: [320, 320]
    optimization:
      skip_frames_detection: 3
      skip_frames_depth: 3

  voice: # ASR + TTS 全语音交互
    audio:
      enable_asr: true
      enable_tts: true
      whisper_model: base
      tts_rate: 180

  tts: # 仅 TTS 语音播报（默认离线 pyttsx3）
    audio:
      enable_tts: true
      tts_rate: 180

  mimo-tts: # MiMo 云端 TTS
    audio:
      enable_tts: true
      tts_provider: mimo

# balanced 无额外 override，直接使用下方基础配置。

# ---- 基础配置（所有 profile 共享） ----

target_queries:
  - "a cup"
  - "a bottle"

camera:
  width: 640
  height: 480

model:
  owlvit_model: "google/owlvit-base-patch32"
  owlvit_input_size: [384, 384]
  owlvit_confidence_threshold: 0.1
  midas_model: "MiDaS_small"
  midas_scale: 0.5
  hand_max_num: 1
  hand_min_confidence: 0.5

optimization:
  use_fp16: true
  skip_frames_detection: 2
  skip_frames_depth: 2
  device: "auto" # auto / cuda / cpu

guidance:
  horizontal_threshold: 30
  vertical_threshold: 30
  depth_threshold: 0.15
  horizontal_threshold_enter: 24
  horizontal_threshold_exit: 36
  vertical_threshold_enter: 24
  vertical_threshold_exit: 36
  depth_threshold_enter: 0.12
  depth_threshold_exit: 0.18
  grasp_stable_frames: 8
  grasp_release_frames: 3

audio:
  enable_asr: false
  whisper_model: "base"
  asr_language: "en"
  enable_tts: false
  tts_provider: "pyttsx3"
  tts_rate: 150
  tts_volume: 1.0
  tts_async: true
  tts_instruction_interval_sec: 3.0
  tts_grab_repeat_sec: 3.0
  tts_max_queue_size: 1
  tts_drop_stale: true
  tts_state_change_bypass: true
  mimo_voice: "mimo_default"
  record_sample_rate: 16000
  record_duration: 5.0
  auto_detect_silence: true
  silence_threshold: 0.01
  silence_duration: 1.5

llm_vision:
  enable_llm_parsing: true
  poe_model: "deepseek-v3.2"
  poe_timeout_sec: 5.0
  max_frames_for_vision: 4
  api_retry_count: 1

logging:
  log_dir: "logs"
  log_level: "INFO"
  log_to_file: true
  log_to_console: true
  enable_fps_stats: true
  fps_window_size: 30
